<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tips & Secrets</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="firebaseConfig.js"></script>

  <link rel="stylesheet" href="viewrecipes.css" />
 
  
  <style>
    body {
      background: url('top-view-food-frame-with-copy-space.jpg') no-repeat center center fixed;
      background-size: cover;
      font-family: cursive;
      margin: 0;
      padding: 0;
      color: antiquewhite;
    }

    .tips-container {
      max-width: 700px;
      margin: 80px auto;
      padding: 40px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      border: 3px solid antiquewhite;
      border-radius: 50px;
      text-align: center;
    }

    .tips-container h1 {
      font-size: 50px;
      margin-bottom: 30px;
      color: antiquewhite;
      text-shadow: 4px 4px #000;
    }

    .tips-form input, .tips-form select {
      width: 90%;
      padding: 12px;
      margin-bottom: 20px;
      border: 2px solid antiquewhite;
      border-radius: 20px;
      background-color: #fff8e7;
      font-family: cursive;
      color: black;
    }

    .tips-list {
      list-style-type: none;
      text-align: left;
      padding: 0;
      margin-top: 30px;
    }

    .tips-list li {
      background: linear-gradient(135deg, rgba(255, 235, 205, 0.1), rgba(255, 239, 213, 0.2));
      border: 2px solid antiquewhite;
      border-radius: 25px;
      padding: 20px;
      margin-bottom: 15px;
      font-size: 18px;
      color: antiquewhite;
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.1);
      animation: fadeIn 0.3s ease-in-out;
    }

    .tip-actions {
      margin-top: 10px;
    }

    .likeBtn, .shareTipBtn {
      background: none;
      border: none;
      color: antiquewhite;
      cursor: pointer;
      font-size: 16px;
      margin-right: 10px;
    }

    

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  


  <div class="tips-container">
    <h1>🍳 Tips & Secrets 🔥</h1>

    <form id="tipForm" class="tips-form">
      <input type="text" id="tipInput" placeholder="Drop your sizzling kitchen secret..." required />
      <select id="tipCategory" required>
        <option value="" disabled selected>Select category</option>
        <option value="Hack">Hack</option>
        <option value="Flavor">Flavor</option>
        <option value="Health">Health</option>
      </select>
      <button type="submit" class="button-55 mt-3">Submit Tip</button>
    </form>



    <ul id="tipsList" class="tips-list"></ul>

    <button class="button-55 mt-5" onclick="location.href='Home.html';">⬅ Back to Home</button>
  </div>

  <script>
    const db = firebase.firestore();
    const tipInput = document.getElementById("tipInput");
    const tipForm = document.getElementById("tipForm");
    const tipsList = document.getElementById("tipsList");
    const tipCategory = document.getElementById("tipCategory");
    const topTipDiv = document.getElementById("topTip");
  
    // Submit tip
    tipForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const tipText = tipInput.value.trim();
      const category = tipCategory.value;
      if (tipText && category) {
        await db.collection("tips").add({
          text: tipText,
          category: category,
          likes: 0,
          timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        });
        tipInput.value = "";
        tipCategory.value = "";
      }
    });
  
    // Load and render all tips
    db.collection("tips").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
      tipsList.innerHTML = "";
      snapshot.forEach((doc) => {
        const data = doc.data();
        const li = document.createElement("li");
        li.innerHTML = `
          <strong>🏷️ ${data.category}:</strong> ${data.text}
          <div class="tip-actions">
            <button class="likeBtn" data-id="${doc.id}">❤️ ${data.likes || 0}</button>
            <button class="shareTipBtn" data-id="${doc.id}">🔗</button>
            <button class="deleteBtn" data-id="${doc.id}">🗑️</button>
          </div>
        `;
        tipsList.appendChild(li);
      });
  
      // Like handler
      document.querySelectorAll('.likeBtn').forEach(button => {
        button.addEventListener('click', async () => {
          const id = button.dataset.id;
          const tipRef = db.collection("tips").doc(id);
          await tipRef.update({
            likes: firebase.firestore.FieldValue.increment(1)
          });
        });
      });
  
      // Share handler
      document.querySelectorAll('.shareTipBtn').forEach(button => {
        button.addEventListener('click', () => {
          const shareURL = `${location.origin}/tips.html?id=${button.dataset.id}`;
          navigator.clipboard.writeText(shareURL).then(() => alert("✅ Tip link copied!"));
        });
      });
  
      // Delete handler
      document.querySelectorAll('.deleteBtn').forEach(button => {
        button.addEventListener('click', async () => {
          const id = button.dataset.id;
          if (confirm("Are you sure you want to delete this tip?")) {
            await db.collection("tips").doc(id).delete();
          }
        });
      });
    });
  
    // Realtime Top Tip loader
    db.collection("featuredTip").doc("today").onSnapshot((doc) => {
      if (doc.exists) {
        const data = doc.data();
        topTipDiv.innerHTML = `🌟 <strong>${data.category}:</strong> ${data.text} <span style="font-size: 1.2rem;">❤️ ${data.likes || 0}</span>`;
      }
    });
  </script>
</body>
</html>
